name: Build Windows Executable

on:
  push:
    branches: [ main ]  # Triggers when you push to the main branch

jobs:
  build:
    runs-on: windows-latest  # Runs on a virtual Windows server

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # Matches a standard Python version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --noconsole --collect-submodules paddles --collect-submodules ball main.py

    - name: Upload Executable
      uses: actions/upload-artifact@v3
      with:
        name: Pong-Windows-Exe
        path: dist/main.exe